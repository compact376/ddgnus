name: ddgnus
region: nyc

services:
  # ── Backend (Go / Stripe API) — ~$5/month ────────────────────────────────────
  - name: backend
    github:
      repo: compact376/ddgnus
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    routes:
      - path: /api
    envs:
      # Set these as encrypted secrets in the DO dashboard (never hardcode)
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PUBLISHABLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET

      # Stripe price IDs (not sensitive)
      - key: STRIPE_PRICE_WELLNESS
        scope: RUN_TIME
        value: price_1TGUiTKSZecAC4IPtx6BUIqK
      - key: STRIPE_PRICE_BOOK
        scope: RUN_TIME
        value: price_1TGUiMKSZecAC4IPkmhi2vMo

      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_TIME
        value: https://dgnus.com
      - key: ALLOWED_ORIGIN
        scope: RUN_TIME
        value: https://dgnus.com

static_sites:
  # ── Frontend (Next.js static export) — FREE ──────────────────────────────────
  - name: frontend
    github:
      repo: compact376/ddgnus
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm run build
    output_dir: out
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_APP_URL
        scope: BUILD_TIME
        value: https://dgnus.com
